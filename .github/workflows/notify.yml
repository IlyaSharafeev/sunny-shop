name: Telegram Notify

on:
  push:
    branches: [master]

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy started
        run: |
          MSG="🚀 Deploy started%0A📦 ${{ github.repository }}%0A💬 ${{ github.event.head_commit.message }}%0A👤 ${{ github.event.head_commit.author.name }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG"

  wait-and-check:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - name: Debug Vercel API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "=== ALL PROJECTS ==="
          curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | jq '[.projects[] | {id, name}]' 2>/dev/null

          echo "=== DEPLOYMENTS (no filter) ==="
          curl -s "https://api.vercel.com/v6/deployments?limit=3" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | jq '[.deployments[] | {uid, name, state, readyState, target}]' 2>/dev/null
